<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Iryo Studio — Diagnóstico de almacenamiento</title>
<style>
  :root{ --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#e6edf3;
         --dim:#8b949e; --iryo:#e8201c; --ok:#2ea043; --bad:#f85149; --warn:#d29922; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
       font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
       padding:18px;line-height:1.45}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:var(--dim);font-size:13px;margin:0 0 18px}
  .card{background:var(--panel);border:1px solid var(--border);
        border-radius:12px;padding:14px 16px;margin:0 0 12px}
  .row{display:flex;align-items:flex-start;gap:10px;margin:0 0 10px}
  .row:last-child{margin-bottom:0}
  .ico{font-size:20px;line-height:1.2;flex:0 0 auto}
  .t{font-weight:600;font-size:15px}
  .d{color:var(--dim);font-size:13px;margin-top:2px}
  .verdict{border-left:4px solid var(--iryo);background:#1c2128;
           border-radius:8px;padding:14px 16px;font-size:15px;margin-top:6px}
  .verdict b{color:#fff}
  .tag{display:inline-block;font-size:11px;font-weight:700;border-radius:5px;
       padding:1px 7px;margin-left:6px;vertical-align:middle}
  .tag.ok{background:rgba(46,160,67,.18);color:#56d364}
  .tag.bad{background:rgba(248,81,73,.18);color:#ff7b72}
  .tag.warn{background:rgba(210,153,34,.18);color:#e3b341}
  pre{background:#0b0f14;border:1px solid var(--border);border-radius:8px;
      padding:10px;font-size:11px;color:var(--dim);overflow-x:auto;white-space:pre-wrap;word-break:break-word}
  button{background:var(--iryo);color:#fff;border:0;border-radius:8px;
         padding:12px 16px;font-size:15px;font-weight:600;width:100%;margin-top:8px}
  .hint{font-size:12px;color:var(--dim);text-align:center;margin-top:14px}
</style>
</head>
<body>
  <h1>Diagnóstico de almacenamiento</h1>
  <p class="sub">Iryo Studio · comprueba qué puede hacer tu navegador con archivos</p>

  <div class="card" id="results"></div>

  <div class="verdict" id="verdict">Comprobando…</div>

  <button onclick="copiar()">📋 Copiar informe para enviárselo a Claude</button>
  <p class="hint">Haz una captura de pantalla o pulsa el botón y pega el texto en el chat.</p>

  <div class="card" style="margin-top:16px">
    <div class="t">Detalles técnicos</div>
    <pre id="raw"></pre>
  </div>

<script>
(function(){
  function has(x){ try { return !!x; } catch(e){ return false; } }

  var checks = {
    secureContext:  window.isSecureContext === true,
    dirPicker:      has(window.showDirectoryPicker),
    savePicker:     has(window.showSaveFilePicker),
    openPicker:     has(window.showOpenFilePicker),
    fileHandling:   ('launchQueue' in window),
    serviceWorker:  ('serviceWorker' in navigator),
    persistStorage: has(navigator.storage && navigator.storage.persist),
    standalone:     (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||
                    (navigator.standalone === true)
  };

  // El modelo "archivo-real" necesita al menos elegir carpeta o guardar archivo.
  var archivoReal = checks.dirPicker || checks.savePicker;
  var tapToOpen   = checks.fileHandling;

  var items = [
    { key:'archivoReal', ok:archivoReal,
      t:'Carpeta de archivos propia (File System Access)',
      d: archivoReal
          ? 'Tu navegador SÍ puede escribir archivos en una carpeta que elijas y verla en el explorador.'
          : 'Tu navegador NO permite a la app escribir en una carpeta visible. (Normal en Android.)' },
    { key:'tapToOpen', ok:tapToOpen,
      t:'Abrir la app tocando un archivo (File Handling)',
      d: tapToOpen
          ? 'Tu navegador SÍ puede registrar la app como editor de archivos .json.'
          : 'Tu navegador NO permite "tocar archivo → abre la app". (Normal en Android.)' },
    { key:'persist', ok:checks.persistStorage,
      t:'Almacenamiento persistente (anti-borrado)',
      d: checks.persistStorage
          ? 'La app puede pedir que sus datos no se borren automáticamente.'
          : 'No disponible: el sistema podría liberar datos si falta espacio.' },
    { key:'sw', ok:checks.serviceWorker,
      t:'Service Worker (funcionar sin conexión)',
      d: checks.serviceWorker
          ? 'Soportado: la app funciona offline y se actualiza sola.'
          : 'No soportado.' }
  ];

  var rh = '';
  items.forEach(function(it){
    var tag = it.ok ? '<span class="tag ok">SÍ</span>' : '<span class="tag bad">NO</span>';
    rh += '<div class="row"><div class="ico">' + (it.ok?'✅':'❌') + '</div>' +
          '<div><div class="t">' + it.t + tag + '</div>' +
          '<div class="d">' + it.d + '</div></div></div>';
  });
  document.getElementById('results').innerHTML = rh;

  // Veredicto
  var v;
  if (archivoReal && tapToOpen) {
    v = '<b>Tu tablet SÍ soporta el modelo archivo-real completo (Opción A).</b> ' +
        'Se puede guardar en una carpeta visible y abrir la app tocando el archivo.';
  } else if (archivoReal) {
    v = '<b>Soporte parcial.</b> Se puede escribir en una carpeta visible, ' +
        'pero "tocar archivo → abre la app" no está disponible. Opción A viable con matices.';
  } else {
    v = '<b>Tu tablet no soporta el modelo archivo-real.</b> ' +
        'Lo esperable en Android. La vía robusta es la <b>Opción B</b> (copia espejo ' +
        'automática a un archivo .json sincronizable con la nube).';
  }
  document.getElementById('verdict').innerHTML = v;

  // Estimación de almacenamiento (asíncrono, opcional)
  var extra = {};
  function finishRaw(){
    var raw = {
      checks: checks,
      navegadorInstaladoComoApp: checks.standalone,
      userAgent: navigator.userAgent,
      plataforma: navigator.platform || '(desconocida)',
      idioma: navigator.language
    };
    for (var k in extra) raw[k] = extra[k];
    document.getElementById('raw').textContent = JSON.stringify(raw, null, 2);
    window.__informe = raw;
  }
  if (navigator.storage && navigator.storage.estimate) {
    navigator.storage.estimate().then(function(e){
      extra.cuotaMB = e.quota ? Math.round(e.quota/1048576) : null;
      extra.usadoMB = e.usage ? Math.round(e.usage/1048576) : null;
      finishRaw();
    }).catch(finishRaw);
  } else { finishRaw(); }

  window.copiar = function(){
    var txt = 'INFORME IRYO STUDIO\n' + JSON.stringify(window.__informe || checks, null, 2);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(txt).then(function(){ alert('Informe copiado. Pégalo en el chat.'); },
        function(){ alert('No se pudo copiar. Haz una captura de pantalla.'); });
    } else {
      alert('No se pudo copiar automáticamente. Haz una captura de pantalla.');
    }
  };
})();
</script>
</body>
</html>
